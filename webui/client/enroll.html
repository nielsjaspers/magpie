<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magpie Enroll</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1020; color: #e7ecff; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    .card { width: min(92vw, 420px); background: #0f1630; border: 1px solid #223056; border-radius: 16px; padding: 20px; display: grid; gap: 12px; }
    input, button { font: inherit; border-radius: 10px; padding: 10px 12px; border: 1px solid #243157; background: #0a1227; color: #e7ecff; }
    button { background: #4f7cff; border: 0; cursor: pointer; }
    .hint { color: #9aa8d6; font-size: 13px; }
    .error { color: #ff9a9a; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <h1 style="margin:0;font-size:20px;">Enroll device</h1>
    <div class="hint">Enter the enrollment code generated from <code>/remote enroll</code>.</div>
    <input id="code" placeholder="Enrollment code" required />
    <input id="deviceName" placeholder="Device name" required />
    <button type="submit">Enroll</button>
    <div id="message" class="hint"></div>
  </form>
  <script>
    const params = new URLSearchParams(location.search);
    const codeEl = document.getElementById('code');
    const nameEl = document.getElementById('deviceName');
    const messageEl = document.getElementById('message');
    codeEl.value = params.get('code') || '';
    nameEl.value = /iPhone|Android|Mobile/i.test(navigator.userAgent) ? 'phone' : 'device';
    document.getElementById('form').addEventListener('submit', async (event) => {
      event.preventDefault();
      messageEl.textContent = 'Enrolling…';
      messageEl.className = 'hint';
      try {
        const response = await fetch('/api/v1/enroll', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ code: codeEl.value, deviceName: nameEl.value, platform: navigator.userAgent }),
        });
        const json = await response.json();
        if (!response.ok) throw new Error(json?.error || `Request failed: ${response.status}`);
        location.href = '/';
      } catch (error) {
        messageEl.textContent = error.message || String(error);
        messageEl.className = 'error';
      }
    });
  </script>
</body>
</html>
