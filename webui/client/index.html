<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magpie Web UI</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #0b1020; color: #e7ecff; }
    .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
    .sidebar { border-right: 1px solid #1f2945; padding: 16px; background: #0f1630; }
    .content { padding: 16px; display: grid; grid-template-rows: auto 1fr auto; gap: 12px; }
    h1,h2 { margin: 0 0 12px; font-size: 16px; }
    button, input, textarea, select { font: inherit; }
    button { background: #4f7cff; color: white; border: 0; border-radius: 10px; padding: 8px 12px; cursor: pointer; }
    button.secondary { background: #1c2747; }
    input, textarea, select { width: 100%; box-sizing: border-box; background: #0a1227; color: #e7ecff; border: 1px solid #243157; border-radius: 10px; padding: 10px; }
    textarea { min-height: 96px; resize: vertical; }
    .stack { display: grid; gap: 10px; }
    .session-list { display: grid; gap: 8px; margin-top: 12px; }
    .session { padding: 10px; border: 1px solid #243157; border-radius: 12px; background: #0a1227; cursor: pointer; }
    .session.active { border-color: #4f7cff; box-shadow: 0 0 0 1px #4f7cff inset; }
    .meta { color: #98a7d9; font-size: 12px; margin-top: 6px; }
    .messages { overflow: auto; border: 1px solid #1f2945; border-radius: 14px; padding: 12px; background: #09101f; display: grid; gap: 10px; }
    .message { padding: 10px 12px; border-radius: 12px; white-space: pre-wrap; }
    .message.user { background: #182546; }
    .message.assistant { background: #101a34; }
    .message.system { background: #211a10; color: #ffd78a; }
    .topbar { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .tiny { font-size: 12px; color: #98a7d9; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Magpie Sessions</h1>
      <div class="stack">
        <button id="refreshButton">Refresh</button>
        <div>
          <label class="tiny" for="newTitle">New web session</label>
          <div class="row">
            <input id="newTitle" placeholder="Optional title" />
            <button id="createButton">Create</button>
          </div>
        </div>
      </div>
      <div id="sessionList" class="session-list"></div>
    </aside>
    <main class="content">
      <div class="topbar">
        <div>
          <h2 id="sessionTitle">No session selected</h2>
          <div id="sessionMeta" class="tiny"></div>
        </div>
        <div class="row" style="max-width: 320px;">
          <button id="interruptButton" class="secondary">Interrupt</button>
          <button id="reloadButton" class="secondary">Reload snapshot</button>
        </div>
      </div>
      <div id="messages" class="messages"></div>
      <div class="stack">
        <textarea id="composer" placeholder="Send a message..."></textarea>
        <div class="row">
          <input id="modelRef" placeholder="provider/model" />
          <button id="sendButton">Send</button>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
