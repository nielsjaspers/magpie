<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Magpie</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ancizar+Serif:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,300..800;1,9..144,300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- External Libs for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="app-layout">
    
    <!-- Mobile Header (Visible only on mobile) -->
    <header class="mobile-header">
      <button id="mobileMenuBtn" class="icon-btn" aria-label="Open Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <h1 class="mobile-title">Magpie</h1>
      <button id="mobileNewSessionBtn" class="icon-btn" aria-label="New Session">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </header>

    <!-- Sidebar Overlay Background (Mobile) -->
    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1>Magpie</h1>
        <button id="closeSidebarBtn" class="icon-btn close-sidebar" aria-label="Close Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div class="sidebar-actions" style="display: flex; gap: var(--spacing-sm);">
        <button id="newSessionBtn" class="btn btn-primary" style="flex: 1;">
          + Session
        </button>
      </div>

      <div class="sidebar-scrollable">
        <div class="session-group-header">
          <h2>Conversations</h2>
          <button id="refreshBtn" class="icon-btn small" aria-label="Refresh" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          </button>
        </div>
        <div id="sessionList" class="session-list">
          <!-- Sessions rendered here -->
        </div>

        <div class="session-group-header" style="margin-top: var(--spacing-lg);">
          <h2>Archived</h2>
          <button id="toggleArchivedBtn" class="icon-btn small text-muted" aria-label="Toggle Archived">
            Show
          </button>
        </div>
        <div id="archivedList" class="session-list" style="display: none;">
          <!-- Archived sessions here -->
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Topbar -->
      <div class="topbar">
        <div class="session-info">
          <h2 id="sessionTitle">Welcome</h2>
          <span id="sessionMeta" class="session-meta">Select or create a session to begin</span>
        </div>
        
        <div class="topbar-actions">
          <button id="copyIdBtn" class="icon-btn" aria-label="Copy Session ID" title="Copy Session ID">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
          
          <button id="interruptBtn" class="icon-btn text-danger" aria-label="Interrupt" title="Interrupt Generation">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18"></rect></svg>
          </button>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="messagesContainer" class="messages-container">
        <div id="messages" class="messages-scroll-area">
          <div class="empty-state">
            <p>Start a conversation to see it here.</p>
          </div>
        </div>
      </div>

      <!-- Composer Area -->
      <div class="composer-container">
        <div class="composer-inner">
          
          <div id="attachmentsArea" class="attachments-area"></div>
          
        <div class="input-row">
            <button id="attachBtn" class="icon-btn attach-btn" aria-label="Attach File">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <input type="file" id="fileInput" multiple style="display: none;" />
            
            <textarea id="composer" class="composer-input" placeholder="Type a message... (Shift+Enter for new line)"></textarea>
            
            <div style="display: flex; align-items: center; gap: var(--spacing-sm);">
              <div class="model-select-wrapper">
                <select id="modelSelect" class="model-select-composer" aria-label="Select Model"></select>
              </div>
              <button id="sendBtn" class="send-btn" aria-label="Send Message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                <div class="spinner" style="display: none;"></div>
              </button>
            </div>
          </div>
          
        </div>
      </div>
      
      <!-- Drag & Drop Overlay -->
      <div id="dropOverlay" class="drop-overlay">
        <div class="drop-content">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          <p>Drop files to attach</p>
        </div>
      </div>
      
    </main>
  </div>
  
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
